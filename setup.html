<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Game Setup</title>
</head>
<body>

    <button onclick="window.location.href='index.html'" 
            style="position: absolute; top: 20px; left: 20px; padding: 10px 20px; cursor: pointer; background: #34495e; color: white; border: 1px solid var(--gold); border-radius: 5px; font-weight: bold; z-index: 100;">
        ← BACK
    </button>

    <div class="menu-card" style="max-width: 600px; margin-top: 60px;">
        <h1 style="color: var(--gold);">MISSION CONFIG</h1>
        
        <div class="setting-group">
            <h3>Team Identification</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="teamRedName" placeholder="Red Team Name" class="btn" style="background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; text-align: left; padding-left: 15px; color: white; flex: 1;">
                <input type="text" id="teamBlueName" placeholder="Blue Team Name" class="btn" style="background: rgba(52, 152, 219, 0.2); border: 1px solid #3498db; text-align: left; padding-left: 15px; color: white; flex: 1;">
            </div>
        </div>
        
        <div style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div class="setting-group" style="flex: 1;">
                <label style="font-weight: bold; color: var(--gold); font-size: 0.9rem;">GRID SIZE:</label>
                <select id="gridSize" class="btn" style="background: #2c3e50; width: 100%; margin-top: 5px;">
                    <option value="4">4x4</option>
                    <option value="5" selected>5x5 Standard</option>
                    <option value="6">6x6 Epic</option>
                </select>
            </div>
            <div class="setting-group" style="flex: 1;">
                <label style="font-weight: bold; color: var(--gold); font-size: 0.9rem;">INTEL DIFFICULTY:</label>
                <select id="difficulty-select" class="btn" style="background: #2c3e50; width: 100%; margin-top: 5px;">
                    <option value="1">Level 1 (Easy)</option>
                    <option value="2" selected>Level 2 (Normal)</option>
                    <option value="3">Level 3 (Hard)</option>
                </select>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">

        <h3 style="color: var(--gold);">INTEL DATA PACKS</h3>
        <p style="font-size: 0.85rem; color: #bdc3c7;">Toggle categories to include specific scripture themes.</p>
        
        <div id="word-pack-container" style="max-height: 30vh; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid #444; margin-bottom: 10px;">
            </div>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn" onclick="randomAll()" style="background: #e67e22; flex: 2; font-size: 0.8rem;">🎲 RANDOM SELECT (60)</button>
            <button class="btn" onclick="clearAll()" style="background: #c0392b; flex: 1; font-size: 0.8rem;">❌ CLEAR</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">

        <div style="margin-top:10px; display: flex; flex-direction: column; gap: 10px;">
            <button class="btn" id="saveBtn" onclick="saveSettings()" style="background: #27ae60; font-weight: bold; font-size: 1.1rem;">💾 SAVE SETTINGS</button>
            <button class="btn" onclick="saveSettings(); window.location.href='game.html'" style="background: var(--gold); color: black; font-weight: bold; font-size: 1.3rem;">🚀 START GAME</button>
        </div>
    </div>

    <div id="toast" style="display:none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 10px 30px; border-radius: 50px; font-weight: bold; z-index: 2000;">SETTINGS SAVED!</div>

    <script src="script.js"></script>
    <script>
        // Visual feedback for saving
        const originalSave = saveSettings;
        saveSettings = function() {
            originalSave();
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        };
    </script>
</body>
</html>
