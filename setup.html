<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Game Setup</title>
</head>
<body>

    <div class="menu-card" style="max-width: 600px;">
        <h1 style="color: var(--gold);">MISSION CONFIG</h1>
        
        <div class="setting-group">
            <h3>Team Identification</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="teamRedName" placeholder="Red Team Name" class="btn" style="background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; text-align: left; padding-left: 15px; color: white;">
                <input type="text" id="teamBlueName" placeholder="Blue Team Name" class="btn" style="background: rgba(52, 152, 219, 0.2); border: 1px solid #3498db; text-align: left; padding-left: 15px; color: white;">
            </div>
        </div>
        
        <div class="setting-group">
            <label style="font-weight: bold; color: var(--gold);">GRID OPERATIONAL SIZE:</label>
            <select id="gridSize" class="btn" style="background: #2c3e50; width: 100%; margin-top: 5px;">
                <option value="4">4x4 (16 Words - Quick Mission)</option>
                <option value="5" selected>5x5 (25 Words - Standard)</option>
                <option value="6">6x6 (36 Words - Epic Length)</option>
            </select>
        </div>

        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">

        <h3 style="color: var(--gold);">INTEL DATA PACKS</h3>
        <p style="font-size: 0.85rem; color: #bdc3c7;">Toggle categories to include specific scripture themes.</p>
        
        <div id="word-pack-container" style="max-height: 40vh; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid #444;">
            </div>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn" onclick="randomAll()" style="background: #e67e22; flex: 2; font-size: 0.8rem;">🎲 RANDOM SELECT (60)</button>
            <button class="btn" onclick="clearAll()" style="background: #c0392b; flex: 1; font-size: 0.8rem;">❌ CLEAR</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">

        <h3 style="color: var(--gold);">MANUAL INTEL (CUSTOM WORDS)</h3>
        <textarea id="customWords" style="width:100%; height:80px; border-radius: 8px; background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 10px; box-sizing: border-box; font-family: sans-serif;" placeholder="Type words here separated by commas..."></textarea>
        
        <div style="margin-top:25px; display: flex; flex-direction: column; gap: 10px;">
            <button class="btn" id="saveBtn" onclick="saveSettings()" style="background: #27ae60; font-weight: bold; font-size: 1.2rem;">💾 SAVE SETTINGS</button>
            <a href="index.html" class="btn" style="background: #34495e; text-align: center;">🏠 BACK TO HOME</a>
        </div>
    </div>

    <div id="toast" style="display:none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 10px 30px; border-radius: 50px; font-weight: bold; z-index: 2000;">SETTINGS SAVED!</div>

    <script src="script.js"></script>
    <script>
        // Visual feedback for saving
        const originalSave = saveSettings;
        saveSettings = function() {
            originalSave();
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        };
    </script>
</body>
</html>
