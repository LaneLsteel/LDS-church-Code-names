<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Game Setup</title>
</head>
<body>

    <div class="menu-card">
        <h1>Game Settings</h1>
        
        <div class="setting-group">
            <h3>Team Names</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="teamRedName" placeholder="Red Team Name" class="btn" style="background: #444; text-align: left; padding-left: 15px;">
                <input type="text" id="teamBlueName" placeholder="Blue Team Name" class="btn" style="background: #444; text-align: left; padding-left: 15px;">
            </div>
        </div>
        
        <div class="setting-group">
            <label>Grid Size:</label>
            <select id="gridSize" class="btn" style="background: #444; width: 100%;">
                <option value="4">4x4 (Quick Game)</option>
                <option value="5" selected>5x5 (Standard)</option>
                <option value="6">6x6 (Epic Game)</option>
            </select>
        </div>

        <hr>

        <h3>Word Packs</h3>
        <p style="font-size: 0.8rem; opacity: 0.7;">Click the name to see words. Check the box to include the group.</p>
        
        <div id="word-pack-container"></div>

        <hr>

        <h3>Word Selection Tools</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn" onclick="randomAll()" style="background: #e67e22; flex: 2;">🎲 RANDOM 60</button>
            <button class="btn" onclick="clearAll()" style="background: #c0392b; flex: 1;">❌ CLEAR ALL</button>
        </div>
        
        <h3>Custom Words</h3>
        <textarea id="customWords" style="width:100%; height:60px; border-radius: 5px; background: #eee; padding: 10px; box-sizing: border-box;" placeholder="Enter words separated by commas..."></textarea>
        
        <div style="margin-top:20px;">
            <button class="btn" onclick="saveSettings()" style="background: #27ae60;">SAVE SETTINGS</button>
            <a href="index.html" class="btn" style="background: #7f8c8d; text-align: center;">BACK TO HOME</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
