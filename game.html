<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Codenames: Live Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="scoreboard">
        <div class="score-box red-score">
            <div id="red-team-display">RED TEAM</div>
            <div id="red-count">0</div>
        </div>
        <div class="score-box blue-score">
            <div id="blue-team-display">BLUE TEAM</div>
            <div id="blue-count">0</div>
        </div>
    </div>

    <div id="game-board"></div>

    <div class="controls" style="margin-top: 20px;">
        <button class="btn" style="background: #27ae60; width: auto; display: inline-block;" onclick="location.reload()">RE-SHUFFLE</button>
        <button class="btn" style="background: #8e44ad; width: auto; display: inline-block;" onmousedown="toggleSpy(true)" onmouseup="toggleSpy(false)">HOLD TO PEEK</button>
        <a href="index.html" class="btn" style="background: #7f8c8d; width: auto; display: inline-block;">QUIT</a>
    </div>

    <div style="margin-top: 30px; text-align: center;">
        <div id="qrcode" style="background: white; padding: 10px; display: inline-block; border-radius: 5px;"></div>
        <p style="font-size: 1rem; color: #aaa; margin-top: 5px;">Spymasters: Scan for the Key</p>
    </div>

    <div id="winner-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
        <h1 style="font-size: 5rem; color: #f9ca24; margin: 0; text-shadow: 0 0 20px #f9ca24;">CONGRATULATIONS!</h1>
        <div id="winner-name" style="font-size: 4rem; font-weight: bold; color: white; margin: 20px 0;">TEAM NAME</div>
        <p style="font-size: 2rem; color: #ccc;">Has Cleared the Board!</p>
        <button class="btn" style="width: 300px; margin-top: 40px;" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <div id="game-over-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20,0,0,0.95); z-index: 1001; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
        <h1 style="font-size: 5rem; color: #ff4757; margin: 0; text-shadow: 0 0 20px #ff4757;">GAME OVER</h1>
        <div id="loser-name" style="font-size: 3rem; font-weight: bold; color: white; margin: 20px 0;">TEAM NAME</div>
        <p style="font-size: 2rem; color: #ccc;">Has found the Assassin!</p>
        <button class="btn" style="background: #ff4757; width: 300px; margin-top: 40px;" onclick="location.reload()">TRY AGAIN</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
