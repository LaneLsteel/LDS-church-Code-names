<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Codenames: Live Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="scoreboard">
        <div class="score-box red-score">
            <div id="red-team-display">RED TEAM</div>
            <div id="red-count">0</div>
        </div>
        <div id="timer-container" style="text-align: center; min-width: 100px;">
            <div style="font-size: 0.8rem; color: var(--gold); letter-spacing: 2px;">TURN TIMER</div>
            <div id="timer" style="font-size: 2.5rem; font-family: monospace; color: #ff4757; font-weight: bold;">60s</div>
        </div>
        <div class="score-box blue-score">
            <div id="blue-team-display">BLUE TEAM</div>
            <div id="blue-count">0</div>
        </div>
    </div>

    <div style="margin-bottom: 15px; text-align: center;">
        <span id="difficulty-display" style="padding: 5px 15px; background: rgba(52, 73, 94, 0.6); border: 1px solid var(--gold); border-radius: 20px; font-weight: bold; color: var(--gold); font-size: 0.9rem; letter-spacing: 1px;">
            INTEL LEVEL: LOADING...
        </span>
    </div>

    <div id="game-board"></div>

    <div class="controls" style="margin-top: 20px; text-align: center;">
        <button class="btn" style="background: #27ae60; width: auto; display: inline-block;" onclick="location.reload()">RE-SHUFFLE</button>
        <button class="btn" style="background: #34495e; width: auto; display: inline-block;" onclick="toggleTurn()">END TURN</button>
        <button class="btn" style="background: #8e44ad; width: auto; display: inline-block;" 
            onmousedown="toggleSpy(true)" onmouseup="toggleSpy(false)"
            ontouchstart="event.preventDefault(); toggleSpy(true)" ontouchend="toggleSpy(false)">
            HOLD TO PEEK
        </button>
        <a href="index.html" class="btn" style="background: #7f8c8d; width: auto; display: inline-block;">QUIT</a>
    </div>

    <div style="margin-top: 30px; text-align: center; position: relative;">
        <div id="qr-wrapper" style="display: none; background: white; padding: 20px; border: 3px solid var(--gold); border-radius: 15px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; box-shadow: 0 0 50px rgba(0,0,0,0.8);">
            <div id="qrcode" style="display: inline-block;"></div>
            <p style="color: #333; margin-top: 10px; font-weight: bold; font-family: sans-serif; margin-bottom: 0;">SPYMASTER KEY</p>
            <p style="color: #666; font-size: 0.7rem; margin-top: 5px;">(Release button to hide)</p>
        </div>

        <button class="btn" style="background: #2c3e50; width: auto; display: inline-block;"
            onmousedown="document.getElementById('qr-wrapper').style.display='block'" 
            onmouseup="document.getElementById('qr-wrapper').style.display='none'"
            ontouchstart="event.preventDefault(); document.getElementById('qr-wrapper').style.display='block'" 
            ontouchend="document.getElementById('qr-wrapper').style.display='none'">
            🔒 HOLD TO SHOW QR
        </button>
    </div>

    <div id="winner-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="font-size: 4rem; color: #f9ca24; text-align: center;">CONGRATULATIONS!</h1>
        <div id="winner-name" style="font-size: 3rem; color: white; margin-bottom: 20px;">TEAM NAME</div>
        <button class="btn" style="width: 300px;" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <div id="game-over-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20,0,0,0.95); z-index: 3001; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="font-size: 4rem; color: #ff4757; text-align: center;">ASSASSIN REVEALED</h1>
        <div id="loser-name" style="font-size: 2rem; color: white; margin-bottom: 20px;">TEAM NAME</div>
        <button class="btn" style="background: #ff4757; width: 300px;" onclick="location.reload()">TRY AGAIN</button>
    </div>

    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="sound-fail" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
